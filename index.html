<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zalo IMEI Cookie - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header với hiệu ứng -->
            <div class="login-header">
                <div class="icon-wrapper">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4A9EFF" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1>Zalo IMEI Tool</h1>
                <p class="subtitle">Quản lý IMEI & Cookie Zalo</p>
            </div>

            <!-- Form Đăng nhập -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>

            <!-- Đăng ký -->
            <div class="register-section">
                <p>Chưa có tài khoản? <a href="#" id="showRegister">Đăng ký ngay</a></p>
            </div>

            <!-- Form Đăng ký (ẩn) -->
            <form id="registerForm" class="register-form" style="display: none;">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="regUsername" placeholder="Chọn tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="regPassword" placeholder="Tạo mật khẩu" required>
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu</label>
                    <input type="password" id="regConfirmPassword" placeholder="Nhập lại mật khẩu" required>
                </div>
                <button type="submit" class="btn-register">Đăng ký</button>
                <p class="back-to-login"><a href="#" id="showLogin">← Quay lại đăng nhập</a></p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
